<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Application Form - Havens Cove</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

.section {
  padding: 80px 20px;
  max-width: 800px;
  margin: auto;
}

/* FORM */
form {
  background: white;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 5px;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-family: 'Poppins';
}

textarea {
  resize: vertical;
  min-height: 120px;
}

button {
  background: #1abc9c;
  color: white;
  border: none;
  padding: 15px;
  width: 100%;
  border-radius: 10px;
  font-size: 1rem;
  cursor: pointer;
}

button:hover {
  background: #16a085;
}

</style>
</head>

<body>

<header>
<h1>Havens Cove</h1>
<nav>
  <a href="index.html#home" class="active">Home</a>
  <a href="about.html">About</a>
  <div class="dropdown">
    <a href="#programs">Programs ▼</a>
    <div class="dropdown-content">
      <a href="detox.html">Detox</a>
      <a href="inpatient.html">Inpatient</a>
      <a href="outpatient.html">Outpatient</a>
    </div>
  </div>
  <a href="apply.html" class="apply-btn">Application</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</nav>

</header>

<section class="section">

<h2 style="text-align:center;">Application Form</h2>
<p style="text-align:center;">Please complete the form below and our team will contact you shortly.</p>

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Type of Program</label>
<select>
  <option>Detox</option>
  <option>Inpatient</option>
  <option>Outpatient</option>
</select>
</div>

<div class="form-group">
<label>Substance / Issue</label>
<input type="text">
</div>

<div class="form-group">
<label>Additional Information</label>
<textarea placeholder="Tell us about your situation..."></textarea>
</div>

<button type="submit">Submit Application</button>

</form>

</section>

<footer>
<p>© 2026 Havens Cove Rehabilitation Centre</p>
</footer>

</body>
</html>
